name: dart_mapper
description: "MapStruct-style object mapping for Dart. Define type-safe mappings declaratively with annotations and get generated implementations at compile time via build_runner."
version: 1.0.4
homepage: https://docs.page/MyLittleSuite/dart_mapper
repository: https://github.com/MyLittleSuite/dart_mapper
issue_tracker: https://github.com/MyLittleSuite/dart_mapper/issues
topics:
  - code-generation
  - mapping
  - build-runner
  - source-gen

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.1
