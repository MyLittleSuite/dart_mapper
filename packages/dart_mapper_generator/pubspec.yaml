name: dart_mapper_generator
description: "Code generator for dart_mapper. Produces mapping implementations at compile time via build_runner."
version: 1.0.5
homepage: https://docs.page/MyLittleSuite/dart_mapper
repository: https://github.com/MyLittleSuite/dart_mapper
issue_tracker: https://github.com/MyLittleSuite/dart_mapper/issues
topics:
  - code-generation
  - mapping
  - build-runner
  - source-gen

environment:
  sdk: ">=3.0.0 <4.0.0"

# Add regular dependencies here.
dependencies:
  analyzer: ^12.0.0
  build: ^4.0.0
  code_builder: ^4.10.1
  dart_style: ^3.0.0
  dart_mapper: ^1.0.0
  source_gen: ^4.0.0
  strings: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.8
  lints: ^6.0.0
  source_gen_test: ^1.0.6
  test: ^1.25.1
